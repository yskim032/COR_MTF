<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTX Converter Statistics</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #111827;
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --border-color: #1f2937;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            border: 1px solid var(--border-color);
        }

        h1,
        h2 {
            margin-top: 0;
            color: #ffffff;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 700px) {
            .tables-grid {
                grid-template-columns: 1fr;
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th,
        td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Prevent date wrapping */
        th:first-child,
        td:first-child {
            white-space: nowrap;
            min-width: 105px;
        }

        th {
            background-color: #1f2937;
            color: #ffffff;
            font-weight: 700;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background-color: #0f172a;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="index.html" class="back-link">&larr; Back to Converter</a>
        <h1>Live Statistics</h1>

        <div id="loader" class="loading">Fetching data from Firebase...</div>

        <div class="tables-grid" id="statsContent" style="display: none;">
            <div>
                <h2>Files Converted</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Converter IPs</th>
                        </tr>
                    </thead>
                    <tbody id="conversionsTable"></tbody>
                </table>
            </div>

            <div>
                <h2>Unique Platform Visitors</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Unique IPs</th>
                        </tr>
                    </thead>
                    <tbody id="visitorsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px; font-size: 12px; color: #6b7280; text-align: center;">
        Statistics powered by Firebase Firestore ✨<br>
        Copyright © 2026 by The-END : YS KIM. All rights reserved.
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjbUJp4RBOV2IAQAmfMtNqOQCAz4VvOlI",
            authDomain: "cor-mft.firebaseapp.com",
            projectId: "cor-mft",
            storageBucket: "cor-mft.firebasestorage.app",
            messagingSenderId: "744224471116",
            appId: "1:744224471116:web:0300625b8051f41a06dce9",
            measurementId: "G-VZXKZX2BT3"
        };

        async function loadStats() {
            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);

                const statsCol = collection(db, "statistics");
                const snapshot = await getDocs(statsCol);

                const conversions = [];
                const visits = [];

                snapshot.forEach(doc => {
                    const id = doc.id;
                    const data = doc.data();

                    if (id.startsWith("conversions_")) {
                        const logs = data.logs || [];
                        // 중복을 제거한 고유 IP 리스트 추출
                        const uniqueIPs = [...new Set(logs.map(l => l.ip))];
                        conversions.push({
                            date: id.replace("conversions_", ""),
                            count: data.count || 0,
                            ips: uniqueIPs.join(", ")
                        });
                    } else if (id.startsWith("visits_")) {
                        visits.push({
                            date: id.replace("visits_", ""),
                            count: (data.ips ? data.ips.length : 0)
                        });
                    }
                });

                // Sort by date descending
                conversions.sort((a, b) => b.date.localeCompare(a.date));
                visits.sort((a, b) => b.date.localeCompare(a.date));

                const convTable = document.getElementById('conversionsTable');
                const visitTable = document.getElementById('visitorsTable');

                if (conversions.length === 0) {
                    convTable.innerHTML = '<tr><td colspan="3">No data yet</td></tr>';
                } else {
                    conversions.forEach(row => {
                        convTable.innerHTML += `<tr><td>${row.date}</td><td>${row.count}</td><td>${row.ips || "-"}</td></tr>`;
                    });
                }

                if (visits.length === 0) {
                    visitTable.innerHTML = '<tr><td colspan="2">No data yet</td></tr>';
                } else {
                    visits.forEach(row => {
                        visitTable.innerHTML += `<tr><td>${row.date}</td><td>${row.count}</td></tr>`;
                    });
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('statsContent').style.display = 'grid';

            } catch (err) {
                console.error(err);
                document.getElementById('loader').textContent = "Error loading stats. Check Firebase permissions.";
            }
        }

        loadStats();
    </script>
</body>

</html>
