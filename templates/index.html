<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTX Web Converter</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --accent-hover: #3182ce;
            --border-color: #30363d;
            --success-color: #2ea043;
            --error-color: #f85149;
        }

        body {
            font-family: 'Segoe UI', Inter, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-color);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-weight: 600;
            color: #ffffff;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-color);
            background: rgba(88, 166, 255, 0.05);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .file-list {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            background: #000;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .file-list.active {
            display: block;
        }

        .file-item {
            font-family: Consolas, monospace;
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .file-item:last-child {
            border-bottom: none;
        }

        .btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: var(--border-color);
            color: #666;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }

        .success { color: var(--success-color); }
        .error { color: var(--error-color); }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DTX Converter Web</h1>
        
        <div class="drop-zone" id="dropZone">
            <div class="icon">📁</div>
            <div style="font-size: 18px; font-weight: 500;">Click to select files or Drag & Drop here</div>
            <div style="font-size: 12px; color: #8b949e; margin-top: 10px;">Supports multiple files (*.GVA, *.txt, *.xls, *.csv, etc.)</div>
            <input type="file" id="fileInput" multiple>
        </div>

        <div class="file-list" id="fileList"></div>

        <button class="btn" id="convertBtn" disabled>Convert Files</button>
        <div class="status" id="statusMsg"></div>
    </div>

    <div class="footer">
        <a href="/stats">View Usage Statistics</a>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const convertBtn = document.getElementById('convertBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        let selectedFiles = [];

        // Drag events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('dragover');
        }

        function unhighlight(e) {
            dropZone.classList.remove('dragover');
        }

        dropZone.addEventListener('drop', handleDrop, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        fileInput.addEventListener('change', function(e) {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            // Check if there are duplicate files selected
            const newFiles = Array.from(files);
            selectedFiles = newFiles; // replace currently selected.
            
            updateFileList();
            convertBtn.disabled = selectedFiles.length === 0;
            statusMsg.textContent = '';
            statusMsg.className = 'status';
        }

        function updateFileList() {
            fileList.innerHTML = '';
            if (selectedFiles.length > 0) {
                fileList.classList.add('active');
                selectedFiles.forEach(file => {
                    const el = document.createElement('div');
                    el.className = 'file-item';
                    el.textContent = file.name;
                    fileList.appendChild(el);
                });
                
                // Keep scroll at bottom
                fileList.scrollTop = fileList.scrollHeight;
            } else {
                fileList.classList.remove('active');
            }
        }

        convertBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            convertBtn.disabled = true;
            convertBtn.textContent = 'Converting...';
            statusMsg.textContent = '';
            statusMsg.className = 'status';

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = downloadUrl;
                    a.download = 'converted_files.zip';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(downloadUrl);
                    
                    statusMsg.textContent = `Successfully converted ${selectedFiles.length} files! Download started.`;
                    statusMsg.className = 'status success';
                } else {
                    const errorMsg = await response.json();
                    statusMsg.textContent = 'Error: ' + (errorMsg.error || 'Conversion failed');
                    statusMsg.className = 'status error';
                }
            } catch (err) {
                statusMsg.textContent = 'Error during conversion';
                statusMsg.className = 'status error';
            } finally {
                convertBtn.disabled = false;
                convertBtn.textContent = 'Convert Files';
            }
        });
    </script>
</body>
</html>
